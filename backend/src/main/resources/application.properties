spring.application.name=fastfood

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.session.jdbc.initialize-schema=always

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:your-super-secret-key-min-32-characters-for-hs256-algorithm-production-use-strong-random-key}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
